services:
  postgres:
    image: postgis/postgis:16-master
    container_name: PostgresDB
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_db:/var/lib/postgresql
  redis:
    image: redis
    container_name: 612-incidents-redis
    ports:
      - 6379:6379
    volumes:
      - redis_data_db:/data

volumes:
  postgres_data_db:
  redis_data_db:
